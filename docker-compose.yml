services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: pensieve
      POSTGRES_USER: pensieve
      POSTGRES_PASSWORD: pensieve
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pensieve -d pensieve"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
